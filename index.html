<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水美土雞城 - 預約式無菜單料理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background: linear-gradient(135deg, #fdfbf7 0%, #f5e6d3 100%); min-height: 100vh; color: #4a3728; }
        .brand-font { font-family: 'Noto Serif TC', serif; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        .tab-active { background: #4a3728; color: #f5e6d3; }
        .tab-inactive { background: transparent; color: #a8a29e; }
        .key-badge { background: #4a3728; color: #f5e6d3; padding: 4px 12px; border-radius: 99px; font-size: 13px; font-weight: 700; }
    </style>
</head>
<body class="py-10 px-4">

    <div class="max-w-3xl mx-auto">
        <div class="glass-card mb-8 overflow-hidden text-center">
            <div class="bg-orange-50/50 p-10 border-b border-orange-100/50">
                <h2 class="text-orange-800 font-bold tracking-widest text-sm brand-font mb-4">「來吃鄉土味，享受雞料理。」</h2>
                <div class="relative inline-block mb-6">
                    <div class="absolute -top-6 -right-10 rotate-12"><span class="key-badge shadow-lg">(請先預訂)</span></div>
                    <h1 class="brand-font text-5xl text-stone-900 leading-tight">水美土雞城</h1>
                </div>
                <p class="text-stone-700 leading-relaxed font-light text-sm max-w-xl mx-auto">位於大甲水美山上的溫暖小屋。販售自養滴雞精與桶仔雞料理。</p>
            </div>
        </div>

        <div class="glass-card mb-6 p-1 flex">
            <button id="tabDining" onclick="switchMode('dining')" class="flex-1 py-4 font-bold rounded-2xl transition-all tab-active">內用訂位</button>
            <button id="tabTakeout" onclick="switchMode('takeout')" class="flex-1 py-4 font-bold rounded-2xl transition-all tab-inactive">外帶預約</button>
        </div>

        <div class="glass-card p-8 md:p-10">
            <h3 id="formTitle" class="brand-font text-2xl mb-8">📅 線上內用訂位</h3>
            <form id="bookingForm" class="grid grid-cols-1 gap-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label class="text-xs font-bold text-stone-500 uppercase">聯絡姓名</label>
                        <input type="text" id="name" required class="mt-1.5 block w-full bg-stone-50 border border-stone-200 rounded-xl p-3.5 outline-none">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-stone-500 uppercase">聯絡電話</label>
                        <input type="tel" id="phone" required class="mt-1.5 block w-full bg-stone-50 border border-stone-200 rounded-xl p-3.5 outline-none">
                    </div>
                </div>

                <div id="diningFields" class="grid grid-cols-2 gap-5">
                    <div>
                        <label class="text-xs font-bold text-stone-500 uppercase">預計人數</label>
                        <input type="number" id="people" value="10" min="1" class="mt-1.5 block w-full bg-stone-50 border border-stone-200 rounded-xl p-3.5">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-stone-500 uppercase">預訂桌數</label>
                        <select id="tables" class="mt-1.5 block w-full bg-stone-50 border border-stone-200 rounded-xl p-3.5">
                            <option value="1" selected>1 桌</option><option value="2">2 桌</option><option value="3">3 桌</option>
                        </select>
                    </div>
                </div>

                <div id="takeoutFields" class="hidden space-y-4 bg-stone-50 p-6 rounded-2xl border border-stone-100">
                    <label class="text-xs font-bold text-orange-800 uppercase">預訂品項與數量</label>
                    <div class="space-y-3 text-sm">
                        <div class="flex justify-between items-center"><span>自養滴雞精 ($220)</span><input type="number" data-item="滴雞精" value="0" min="0" class="w-16 p-2 rounded-lg text-center"></div>
                        <div class="flex justify-between items-center"><span>自製米血 ($90/斤)</span><input type="number" data-item="米血" value="0" min="0" class="w-16 p-2 rounded-lg text-center"></div>
                        <div class="flex justify-between items-center"><span>自養土雞 ($160/斤)</span><input type="number" data-item="土雞" value="0" min="0" class="w-16 p-2 rounded-lg text-center"></div>
                        <div class="flex justify-between items-center"><span>預約桶仔雞</span><input type="number" data-item="桶仔雞" value="0" min="0" class="w-16 p-2 rounded-lg text-center"></div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-5">
                    <div>
                        <label id="dateLabel" class="text-xs font-bold text-stone-500 uppercase">日期</label>
                        <input type="date" id="date" required class="mt-1.5 block w-full bg-stone-50 border border-stone-200 rounded-xl p-3.5">
                    </div>
                    <div>
                        <label id="timeLabel" class="text-xs font-bold text-stone-500 uppercase">時間</label>
                        <input type="time" id="time" required class="mt-1.5 block w-full bg-stone-50 border border-stone-200 rounded-xl p-3.5">
                    </div>
                </div>

                <textarea id="note" rows="2" placeholder="備註需求..." class="mt-1.5 block w-full bg-stone-50 border border-stone-200 rounded-xl p-3.5"></textarea>

                <button type="submit" id="submitBtn" class="w-full bg-stone-900 text-white font-bold py-4 rounded-xl shadow-lg transition-all text-lg tracking-widest">送出預約申請</button>
            </form>
            <div id="messageBox" class="hidden mt-6 p-4 rounded-xl text-center text-sm font-medium"></div>
        </div>

        <div class="mt-8 text-center text-stone-500 text-xs">
            © 水美土雞城 | 市話：04-26887895 | 手機：0912-623297
        </div>
    </div>

    <script>
        let mode = 'dining';
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyQd8zmDyDt74tziKSyrr9h4PiPoxaQzUfVze6hpPHUv47GWGUG82mKxGIVhzJljYc37Q/exec'; // 👈 填入你的 URL
        
        function switchMode(m) {
            mode = m;
            document.getElementById('formTitle').innerText = m === 'dining' ? '📅 線上內用訂位' : '🛍️ 線上外帶預約';
            document.getElementById('dateLabel').innerText = m === 'dining' ? '訂位日期' : '取餐日期';
            document.getElementById('timeLabel').innerText = m === 'dining' ? '抵達時間' : '取餐時間';
            document.getElementById('diningFields').classList.toggle('hidden', m !== 'dining');
            document.getElementById('takeoutFields').classList.toggle('hidden', m === 'dining');
            document.getElementById('tabDining').className = `flex-1 py-4 font-bold rounded-2xl transition-all ${m === 'dining' ? 'tab-active' : 'tab-inactive'}`;
            document.getElementById('tabTakeout').className = `flex-1 py-4 font-bold rounded-2xl transition-all ${m === 'takeout' ? 'tab-active' : 'tab-inactive'}`;
        }

        const form = document.getElementById('bookingForm');
        form.addEventListener('submit', e => {
            e.preventDefault();
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('submitBtn').innerText = '正在處理中...';

            let items = "";
            if(mode === 'takeout') {
                document.querySelectorAll('[data-item]').forEach(el => {
                    if(el.value > 0) items += `${el.getAttribute('data-item')} x ${el.value}\n`;
                });
                if(!items) items = "見備註";
            }

            const data = {
                type: mode,
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                people: document.getElementById('people').value,
                tables: document.getElementById('tables').value,
                date: document.getElementById('date').value,
                time: document.getElementById('time').value,
                note: document.getElementById('note').value,
                orderItems: items
            };

            fetch(scriptURL, { method: 'POST', body: JSON.stringify(data)})
            .then(res => res.json())
            .then(res => {
                const msg = document.getElementById('messageBox');
                msg.className = 'mt-6 p-4 rounded-xl text-center ' + (res.status === 'success' ? 'text-green-700 bg-green-50' : 'text-red-700 bg-red-50');
                msg.innerText = res.message;
                msg.classList.remove('hidden');
                if(res.status === 'success') form.reset();
                document.getElementById('submitBtn').disabled = false;
                document.getElementById('submitBtn').innerText = '送出預約申請';
            });
        });
    </script>
</body>
</html>

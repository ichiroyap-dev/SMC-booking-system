<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水美土雞城 - 預約式無菜單料理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background: linear-gradient(135deg, #fdfbf7 0%, #f5e6d3 100%); min-height: 100vh; color: #4a3728; }
        .brand-font { font-family: 'Noto Serif TC', serif; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        .key-badge { background: #4a3728; color: #f5e6d3; padding: 4px 12px; border-radius: 99px; font-size: 13px; font-weight: 700; letter-spacing: 1px; }
        .rule-badge { background: #ea580c; color: white; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
        .tab-active { background: #4a3728; color: #f5e6d3; }
        .tab-inactive { background: transparent; color: #a8a29e; border: 1px solid transparent; }
    </style>
</head>
<body class="py-10 px-4 md:py-16">

    <div class="max-w-3xl mx-auto">
        <div class="glass-card mb-8 overflow-hidden text-center">
            <div class="bg-orange-50/50 p-8 md:p-12 border-b border-orange-100/50">
                <h2 class="text-orange-800 font-bold tracking-widest text-sm brand-font mb-4">「來吃鄉土味，享受雞料理。」</h2>
                <div class="relative inline-block mb-6">
                    <div class="absolute -top-6 -right-10 rotate-12"><span class="key-badge shadow-lg">(請先預訂)</span></div>
                    <h1 class="brand-font text-5xl text-stone-900 leading-tight">水美土雞城</h1>
                </div>
                <div class="h-1.5 w-20 bg-orange-500 mx-auto rounded-full mb-8"></div>
                <p class="text-stone-700 font-light text-sm max-w-xl mx-auto">大甲水美山上的溫暖小屋，自養土雞、滴雞精與經典鄉土料理。</p>
            </div>
        </div>

        <div class="glass-card p-8 mb-8 grid grid-cols-1 md:grid-cols-2 gap-6 items-center">
            <div class="space-y-4">
                <div class="flex items-center space-x-4 bg-white p-4 rounded-2xl border border-stone-100 shadow-sm">
                    <div class="bg-orange-50 p-2 rounded-full text-xl">🏆</div>
                    <div>
                        <p class="text-xs text-stone-400 font-bold">Google 評價</p>
                        <div class="flex items-center"><span class="text-stone-800 font-bold text-lg mr-2">4.4</span><span class="text-yellow-500 text-sm">★★★★☆</span></div>
                    </div>
                </div>
                <a href="https://maps.app.goo.gl/p8xuCW6kpwypR7iKA" target="_blank" class="block text-center bg-stone-100 hover:bg-stone-200 text-stone-700 font-bold py-3 rounded-xl transition-all border border-stone-200 text-sm">🗺️ 開啟 Google Maps 導航</a>
            </div>
            <div class="h-40 rounded-2xl overflow-hidden border border-stone-200">
                <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d227.21453090590444!2d120.62872978374278!3d24.3314227112444!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x346911f1a73f9003%3A0x789454e7001b740c!2z5rC0576O5Zyf6Zue5Z-O!5e0!3m2!1szh-TW!2sus!4v1776047964419!5m2!1szh-TW!2sus" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
        </div>

        <div class="glass-card mb-6 p-1 flex">
            <button id="tabDining" onclick="switchMode('dining')" class="flex-1 py-4 font-bold rounded-2xl transition-all tab-active">內用訂位</button>
            <button id="tabTakeout" onclick="switchMode('takeout')" class="flex-1 py-4 font-bold rounded-2xl transition-all tab-inactive">外帶預約</button>
        </div>

        <div class="glass-card p-8 md:p-10 mb-8">
            <h3 id="formTitle" class="brand-font text-2xl mb-8 flex items-center text-stone-800">
                <span class="mr-3" id="formTitleIcon">📅</span> <span id="formTitleText">線上內用訂位申請</span>
            </h3>
            
            <form id="bookingForm" class="grid grid-cols-1 gap-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label class="text-xs font-bold text-stone-500 uppercase tracking-widest ml-1">聯絡姓名</label>
                        <input type="text" id="name" required class="mt-1.5 block w-full bg-stone-50 border border-stone-200 rounded-xl p-3.5 outline-none focus:ring-2 focus:ring-orange-500">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-stone-500 uppercase tracking-widest ml-1">聯絡電話</label>
                        <input type="tel" id="phone" required class="mt-1.5 block w-full bg-stone-50 border border-stone-200 rounded-xl p-3.5 outline-none focus:ring-2 focus:ring-orange-500">
                    </div>
                </div>

                <div id="diningFields" class="grid grid-cols-2 gap-5">
                    <div>
                        <label class="text-xs font-bold text-stone-500 uppercase tracking-widest ml-1">預計人數</label>
                        <input type="number" id="people" value="10" min="1" class="mt-1.5 block w-full bg-stone-50 border border-stone-200 rounded-xl p-3.5">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-stone-500 uppercase tracking-widest ml-1">預訂桌數</label>
                        <select id="tables" class="mt-1.5 block w-full bg-stone-50 border border-stone-200 rounded-xl p-3.5">
                            <option value="1" selected>1 桌</option><option value="2">2 桌</option><option value="3">3 桌</option>
                        </select>
                    </div>
                </div>

                <div id="takeoutFields" class="hidden space-y-4 bg-orange-50/50 p-6 rounded-2xl border border-orange-100">
                    <label class="text-xs font-bold text-orange-800 uppercase tracking-widest">預訂品項與數量</label>
                    <div class="space-y-2 text-sm text-stone-700">
                        <div class="flex justify-between items-center bg-white p-3 rounded-xl border border-stone-100">
                            <span>自養土雞滴雞精 ($220)</span>
                            <input type="number" data-item="滴雞精" value="0" min="0" class="w-16 p-2 bg-stone-50 border rounded-lg text-center">
                        </div>
                        <div class="flex justify-between items-center bg-white p-3 rounded-xl border border-stone-100">
                            <span>雞汁炒米粉 (招牌推薦)</span>
                            <input type="number" data-item="雞汁炒米粉" value="0" min="0" class="w-16 p-2 bg-stone-50 border rounded-lg text-center">
                        </div>
                        <div class="flex justify-between items-center bg-white p-3 rounded-xl border border-stone-100">
                            <span>炸客家婆菜 (特色料理)</span>
                            <input type="number" data-item="炸客家婆菜" value="0" min="0" class="w-16 p-2 bg-stone-50 border rounded-lg text-center">
                        </div>
                        <div class="flex justify-between items-center bg-white p-3 rounded-xl border border-stone-100">
                            <span>自製米血 ($90/斤)</span>
                            <input type="number" data-item="米血" value="0" min="0" class="w-16 p-2 bg-stone-50 border rounded-lg text-center">
                        </div>
                        <div class="flex justify-between items-center bg-white p-3 rounded-xl border border-stone-100">
                            <span>預約桶仔雞</span>
                            <input type="number" data-item="桶仔雞" value="0" min="0" class="w-16 p-2 bg-stone-50 border rounded-lg text-center">
                        </div>
                    </div>
                    <div class="mt-4">
                        <label class="text-xs font-bold text-stone-400 uppercase tracking-widest ml-1">其他加點品項 (請手寫品項與數量)</label>
                        <input type="text" id="customItem" placeholder="例如：炒青菜 x1, 白飯 x3" class="mt-1.5 block w-full bg-white border border-stone-200 rounded-xl p-3.5 text-sm outline-none focus:ring-2 focus:ring-orange-500">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-5">
                    <div>
                        <label id="dateLabel" class="text-xs font-bold text-stone-500 uppercase tracking-widest ml-1">日期</label>
                        <input type="date" id="date" required class="mt-1.5 block w-full bg-stone-50 border border-stone-200 rounded-xl p-3.5">
                    </div>
                    <div>
                        <label id="timeLabel" class="text-xs font-bold text-stone-500 uppercase tracking-widest ml-1">時間</label>
                        <input type="time" id="time" required class="mt-1.5 block w-full bg-stone-50 border border-stone-200 rounded-xl p-3.5">
                    </div>
                </div>

                <textarea id="note" rows="2" placeholder="備註需求..." class="mt-1.5 block w-full bg-stone-50 border border-stone-200 rounded-xl p-3.5"></textarea>

                <button type="submit" id="submitBtn" class="w-full bg-stone-900 text-white font-bold py-4 rounded-xl shadow-lg transition-all text-lg tracking-widest">送出預約申請</button>
            </form>
            <div id="messageBox" class="hidden mt-8 p-5 rounded-xl text-center text-sm font-medium animate-pulse"></div>
        </div>

        <footer class="text-center text-stone-400 text-xs pb-10">© SMC Turkey City. 市話：04-26887895</footer>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyQd8zmDyDt74tziKSyrr9h4PiPoxaQzUfVze6hpPHUv47GWGUG82mKxGIVhzJljYc37Q/exec'; 
        let currentMode = 'dining';
        const form = document.getElementById('bookingForm');
        const btn = document.getElementById('submitBtn');
        const msg = document.getElementById('messageBox');

        document.getElementById('date').setAttribute('min', new Date().toISOString().split('T')[0]);

        function switchMode(mode) {
            currentMode = mode;
            const isDining = (mode === 'dining');
            document.getElementById('formTitleIcon').innerText = isDining ? '📅' : '🛍️';
            document.getElementById('formTitleText').innerText = isDining ? '線上內用訂位申請' : '線上外帶預約表單';
            document.getElementById('dateLabel').innerText = isDining ? '預定日期' : '取餐日期';
            document.getElementById('timeLabel').innerText = isDining ? '抵達時間' : '取餐時間';
            document.getElementById('diningFields').classList.toggle('hidden', !isDining);
            document.getElementById('takeoutFields').classList.toggle('hidden', isDining);
            document.getElementById('tabDining').className = `flex-1 py-4 font-bold rounded-2xl transition-all ${isDining ? 'tab-active' : 'tab-inactive'}`;
            document.getElementById('tabTakeout').className = `flex-1 py-4 font-bold rounded-2xl transition-all ${isDining ? 'tab-inactive' : 'tab-active'}`;
        }

        form.addEventListener('submit', e => {
            e.preventDefault();
            btn.disabled = true;
            btn.innerText = '正在處理中...';
            msg.className = 'mt-8 p-5 rounded-xl text-center text-blue-700 bg-blue-50';
            msg.innerText = '正在連線數位櫃檯...';
            msg.classList.remove('hidden');

            let itemsStr = "";
            if(currentMode === 'takeout') {
                document.querySelectorAll('[data-item]').forEach(el => {
                    if(el.value > 0) itemsStr += `${el.getAttribute('data-item')} x ${el.value}\n`;
                });
                const custom = document.getElementById('customItem').value.trim();
                if(custom) itemsStr += `其他：${custom}\n`;
                if(!itemsStr) itemsStr = "見備註";
            }

            const data = {
                type: currentMode,
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                people: document.getElementById('people').value,
                tables: document.getElementById('tables').value,
                date: document.getElementById('date').value,
                time: document.getElementById('time').value,
                note: document.getElementById('note').value,
                orderItems: itemsStr
            };

            fetch(scriptURL, { method: 'POST', body: JSON.stringify(data)})
            .then(res => res.json())
            .then(res => {
                msg.className = 'mt-8 p-5 rounded-xl text-center ' + (res.status === 'success' ? 'text-green-700 bg-green-50' : 'text-red-700 bg-red-50');
                msg.innerText = res.message;
                if(res.status === 'success') {
                    form.reset();
                    document.querySelectorAll('[data-item]').forEach(el => el.value = "0");
                }
                btn.disabled = false;
                btn.innerText = '送出預約申請';
            });
        });
    </script>
</body>
</html>

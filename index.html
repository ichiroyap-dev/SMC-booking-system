<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水美土雞城 - 內用/外帶預約</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background: linear-gradient(135deg, #fdfbf7 0%, #f5e6d3 100%); min-height: 100vh; color: #4a3728; }
        .brand-font { font-family: 'Noto Serif TC', serif; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        .tab-active { background: #4a3728; color: #f5e6d3; }
        .tab-inactive { background: transparent; color: #a8a29e; }
    </style>
</head>
<body class="py-10 px-4">
    <div class="max-w-2xl mx-auto">
        <div class="text-center mb-8">
            <h1 class="brand-font text-4xl text-stone-900 mb-2">水美土雞城</h1>
            <p class="text-orange-700 font-bold text-sm">「來吃鄉土味，享受雞料理。」</p>
        </div>

        <div class="glass-card mb-6 p-1 flex overflow-hidden">
            <button id="tabDining" onclick="switchMode('dining')" class="flex-1 py-3 font-bold rounded-2xl transition-all tab-active">內用訂位</button>
            <button id="tabTakeout" onclick="switchMode('takeout')" class="flex-1 py-3 font-bold rounded-2xl transition-all tab-inactive">外帶預約</button>
        </div>

        <div class="glass-card p-8 shadow-xl">
            <h3 id="formTitle" class="brand-font text-2xl mb-6">📅 線上內用訂位</h3>
            
            <form id="bookingForm" class="space-y-5">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-bold text-stone-400">聯絡姓名</label>
                        <input type="text" id="name" required class="mt-1 block w-full bg-stone-50 border-stone-200 rounded-xl p-3">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-stone-400">聯絡電話</label>
                        <input type="tel" id="phone" required class="mt-1 block w-full bg-stone-50 border-stone-200 rounded-xl p-3">
                    </div>
                </div>

                <div id="diningFields" class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-bold text-stone-400">預計人數</label>
                        <input type="number" id="people" value="10" min="1" class="mt-1 block w-full bg-stone-50 border-stone-200 rounded-xl p-3">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-stone-400">預訂桌數</label>
                        <select id="tables" class="mt-1 block w-full bg-stone-50 border-stone-200 rounded-xl p-3">
                            <option value="1">1 桌</option><option value="2">2 桌</option><option value="3">3 桌</option>
                        </select>
                    </div>
                </div>

                <div id="takeoutFields" class="hidden space-y-3 bg-orange-50/50 p-4 rounded-2xl">
                    <label class="text-xs font-bold text-orange-800">預訂品項</label>
                    <div class="space-y-2 text-sm">
                        <label class="flex items-center justify-between">
                            <span>自養土雞滴雞精 ($220)</span>
                            <input type="number" data-item="滴雞精" value="0" min="0" class="w-16 p-1 rounded border-stone-200 text-center">
                        </label>
                        <label class="flex items-center justify-between">
                            <span>自製米血 ($90/斤)</span>
                            <input type="number" data-item="米血" value="0" min="0" class="w-16 p-1 rounded border-stone-200 text-center">
                        </label>
                        <label class="flex items-center justify-between">
                            <span>自養土雞 ($160/斤)</span>
                            <input type="number" data-item="土雞" value="0" min="0" class="w-16 p-1 rounded border-stone-200 text-center">
                        </label>
                        <label class="flex items-center justify-between">
                            <span>桶仔雞 (預約限定)</span>
                            <input type="number" data-item="桶仔雞" value="0" min="0" class="w-16 p-1 rounded border-stone-200 text-center">
                        </label>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label id="dateLabel" class="text-xs font-bold text-stone-400">訂位日期</label>
                        <input type="date" id="date" required class="mt-1 block w-full bg-stone-50 border-stone-200 rounded-xl p-3">
                    </div>
                    <div>
                        <label id="timeLabel" class="text-xs font-bold text-stone-400">抵達時間</label>
                        <input type="time" id="time" required class="mt-1 block w-full bg-stone-50 border-stone-200 rounded-xl p-3">
                    </div>
                </div>

                <div>
                    <label class="text-xs font-bold text-stone-400">其他需求 (備註)</label>
                    <textarea id="note" rows="2" class="mt-1 block w-full bg-stone-50 border-stone-200 rounded-xl p-3"></textarea>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-stone-900 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-black transition-all">送出預約申請</button>
            </form>
            <div id="messageBox" class="hidden mt-6 p-4 rounded-xl text-center text-sm font-medium"></div>
        </div>
    </div>

    <script>
        let currentMode = 'dining';
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyQd8zmDyDt74tziKSyrr9h4PiPoxaQzUfVze6hpPHUv47GWGUG82mKxGIVhzJljYc37Q/exec'; 

        function switchMode(mode) {
            currentMode = mode;
            const isDining = (mode === 'dining');
            document.getElementById('formTitle').innerText = isDining ? '📅 線上內用訂位' : '🛍️ 線上外帶預約';
            document.getElementById('dateLabel').innerText = isDining ? '訂位日期' : '取餐日期';
            document.getElementById('timeLabel').innerText = isDining ? '抵達時間' : '取餐時間';
            document.getElementById('diningFields').classList.toggle('hidden', !isDining);
            document.getElementById('takeoutFields').classList.toggle('hidden', isDining);
            document.getElementById('tabDining').className = `flex-1 py-3 font-bold rounded-2xl transition-all ${isDining ? 'tab-active' : 'tab-inactive'}`;
            document.getElementById('tabTakeout').className = `flex-1 py-3 font-bold rounded-2xl transition-all ${isDining ? 'tab-inactive' : 'tab-active'}`;
        }

        form.addEventListener('submit', e => {
            e.preventDefault();
            btn.disabled = true;
            btn.innerText = '處理中...';
            
            // 整理外帶品項文字
            let itemsStr = "";
            if(currentMode === 'takeout') {
                document.querySelectorAll('[data-item]').forEach(el => {
                    if(el.value > 0) itemsStr += `${el.getAttribute('data-item')} x ${el.value}\n`;
                });
                if(!itemsStr) itemsStr = "未選擇具體品項 (見備註)";
            }

            const data = {
                type: currentMode,
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                people: document.getElementById('people').value,
                tables: document.getElementById('tables').value,
                date: document.getElementById('date').value,
                time: document.getElementById('time').value,
                note: document.getElementById('note').value,
                orderItems: itemsStr
            };

            fetch(scriptURL, { method: 'POST', body: JSON.stringify(data)})
            .then(res => res.json())
            .then(res => {
                msg.className = 'mt-6 p-4 rounded-xl text-center ' + (res.status === 'success' ? 'text-green-600 bg-green-50' : 'text-red-600 bg-red-50');
                msg.innerText = res.message;
                msg.classList.remove('hidden');
                if(res.status === 'success') form.reset();
                btn.disabled = false;
                btn.innerText = '送出預約申請';
            });
        });
    </script>
</body>
</html>
